name: helios
description: Helios — modular Flutter host for identity (Google + Helios Core) and feature plugins.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.6.2
  google_sign_in: ^6.2.2
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  provider: ^6.1.2
  helios_auth_contract:
    path: packages/helios_auth_contract
  todo:
    path: packages/todo
  movies:
    path: packages/movies

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
